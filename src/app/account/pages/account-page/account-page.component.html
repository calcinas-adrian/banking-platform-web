<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 shadow-sm mb-lg-5">
  <div class="container-fluid">
    <!-- Logo o nombre -->
    <a class="navbar-brand fw-bold" href="#">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sistema
    </a>

    <!-- Enlaces de navegación -->
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        @for (link of listLinks; track $index) {
        <li class="nav-item">
          <a
            class="nav-link"
            [routerLink]="link.url"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            {{ link.name }}
          </a>
        </li>
        }
      </ul>
    </div>

    <!-- Email badge -->
    <span class="badge bg-dark me-2 d-flex align-items-center">
      <i class="bi bi-person-fill me-1"></i>
      {{ email() }}
    </span>

    <!-- Botón cerrar sesión -->
    <button
      class="btn btn-outline-light btn-sm d-flex align-items-center gap-2"
      (click)="handleLogout()"
    >
      <i class="bi bi-door-closed-fill"></i>
      Cerrar sesión
    </button>
  </div>
</nav>

<router-outlet />
