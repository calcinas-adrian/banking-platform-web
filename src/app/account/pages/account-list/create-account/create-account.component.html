<form action="/crear-cuenta" method="post" autocomplete="off">
  <div class="mb-3">
    <label for="saldo" class="form-label">Saldo inicial</label>
    <div class="input-group">
      <span class="input-group-text">
        <i class="bi bi-currency-dollar text-success"></i>
      </span>
      <input
        type="number"
        step="0.01"
        id="saldo"
        name="saldo"
        class="form-control"
        value="900.0"
        min="0"
        required
      />
    </div>
  </div>
  <div class="mb-4">
    <label for="type" class="form-label">Tipo de cuenta</label>
    <div class="input-group">
      <span class="input-group-text">
        <i class="bi bi-wallet2"></i>
      </span>
      <input
        type="text"
        id="type"
        name="type"
        class="form-control"
        value="Ahorros"
        required
        maxlength="20"
        placeholder="Ej: Ahorros, Corriente..."
      />
    </div>
  </div>
  <div class="d-grid">
    <button type="submit" class="btn btn-success btn-lg">
      <i class="bi bi-check-circle me-1"></i>Crear cuenta
    </button>
  </div>
</form>
