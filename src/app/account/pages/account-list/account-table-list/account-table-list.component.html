<div class="table-responsive">
  <table class="table table-hover table-striped align-middle mb-0">
    <thead class="table-primary">
      <tr>
        <th scope="col"><i class="bi bi-hash me-1"></i>ID</th>
        <th scope="col"><i class="bi bi-123 me-1"></i>Número</th>
        <th scope="col"><i class="bi bi-cash-coin me-1"></i>Saldo</th>
        <th scope="col"><i class="bi bi-wallet2 me-1"></i>Tipo</th>
      </tr>
    </thead>
    <tbody>
      @for (account of accountList(); track $index){
      <tr>
        <td class="fw-bold">{{ account.id }}</td>
        <td>{{ account.number }}</td>
        <td>
          <span
            class="badge bg-opacity-75 fs-6"
            [class.bg-secondary]="account.saldo <= 0"
            [class.bg-success]="account.saldo > 0"
          >
            <i class="bi bi-currency-dollar"></i>
            {{ account.saldo }}
          </span>
        </td>
        <td>
          <span
            class="badge bg-info text-dark"
            [class.bg-warning]="account.type !== 'Ahorros'"
            [class.bg-info]="account.type === 'Ahorros'"
          >
            {{ account.type }}
          </span>
        </td>
      </tr>
      }@empty {
      <tr>
        <td colspan="4" class="text-center">
          <div class="alert alert-warning mb-0">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            No hay cuentas registradas.
          </div>
        </td>
      </tr>
      }
    </tbody>
    <tfoot>
      <tr class="table-secondary">
        <th colspan="3" class="text-start fs-5 py-3">
          <i class="bi bi-list-ol me-1 text-primary"></i>
          Total de Cuentas
        </th>
        <th class="fs-5 py-3 text-primary text-center">
          {{ accountList().length }}
        </th>
      </tr>
    </tfoot>
  </table>
</div>
