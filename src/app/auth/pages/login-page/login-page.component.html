<div
  class="container-fluid min-vh-100 d-flex align-items-center justify-content-center"
  style="
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
  "
>
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4 col-xxl-3">
        <div
          class="card shadow-lg border-0 rounded-4"
          style="max-width: 450px; margin: 0 auto"
        >
          <div
            class="card-header text-white text-center py-4 border-0 rounded-top-4"
            style="
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            "
          >
            <div class="mb-3">
              <i class="bi bi-box-arrow-in-right" style="font-size: 3rem"></i>
            </div>
            <h2 class="mb-1 fw-bold">Iniciar Sesión</h2>
            <p class="mb-0 opacity-75">Bienvenido de vuelta</p>
          </div>
          <div class="card-body p-4">
            <form class="needs-validation" novalidate>
              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label fw-semibold text-dark">
                  <i class="bi bi-envelope-at-fill text-primary me-2"></i>Correo
                  Electrónico
                </label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-control form-control-lg rounded-3 shadow-sm"
                  placeholder="usuario@ejemplo.com"
                  required
                  style="border: 2px solid #e9ecef; transition: all 0.3s ease"
                  [ngModel]="credentials().email"
                  (ngModelChange)="credentials().email = $event"
                />
              </div>

              <!-- Contraseña -->
              <div class="mb-3">
                <label for="password" class="form-label fw-semibold text-dark">
                  <i class="bi bi-lock-fill text-primary me-2"></i>Contraseña
                </label>
                <input
                  type="password"
                  id="password"
                  name="contrasena"
                  class="form-control form-control-lg rounded-3 shadow-sm"
                  placeholder="••••••••"
                  required
                  style="border: 2px solid #e9ecef; transition: all 0.3s ease"
                  [ngModel]="credentials().password"
                  (ngModelChange)="credentials().password = $event"
                />
              </div>

              <!-- Recordarme y Olvidé contraseña -->
              <div
                class="d-flex justify-content-between align-items-center mb-4"
              >
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="rememberMe"
                    style="transform: scale(1.1)"
                  />
                  <label class="form-check-label text-muted" for="rememberMe">
                    Recordarme
                  </label>
                </div>
                <a
                  href="#"
                  class="text-primary text-decoration-none fw-semibold small"
                >
                  ¿Olvidaste tu contraseña?
                </a>
              </div>

              <!-- Botón -->
              <div class="d-grid mb-4">
                <button
                  type="button"
                  class="btn btn-lg py-3 text-white fw-bold border-0 rounded-3 shadow"
                  style="
                    background: linear-gradient(
                      135deg,
                      #667eea 0%,
                      #764ba2 100%
                    );
                    transition: all 0.3s ease;
                    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
                  "
                  onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(102, 126, 234, 0.6)';"
                  onmouseout="this.style.transform='translateY(0px)'; this.style.boxShadow='0 4px 15px rgba(102, 126, 234, 0.4)';"
                  (click)="handleLogin()"
                >
                  <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                </button>
              </div>
            </form>
          </div>
          <div
            class="card-footer text-center py-4 bg-light border-0 rounded-bottom-4"
          >
            <p class="mb-3 text-muted">¿No tienes una cuenta?</p>
            <a
              [routerLink]="['/auth/new-user']"
              class="btn btn-outline-primary rounded-pill px-4 py-2 text-decoration-none fw-semibold shadow-sm"
              style="transition: all 0.3s ease"
              onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 4px 12px rgba(102, 126, 234, 0.3)';"
              onmouseout="this.style.transform='translateY(0px)'; this.style.boxShadow='0 2px 6px rgba(0,0,0,0.1)';"
            >
              <i class="bi bi-person-plus-fill me-2"></i>Crear Cuenta
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .form-control:focus,
  .form-select:focus {
    border-color: #667eea !important;
    box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25) !important;
  }

  .form-control:hover,
  .form-select:hover {
    border-color: #667eea !important;
  }

  .form-check-input:checked {
    background-color: #667eea !important;
    border-color: #667eea !important;
  }

  /* Pantallas pequeñas (móviles) */
  @media (max-width: 768px) {
    .card-body {
      padding: 2rem 1.5rem !important;
    }

    .container-fluid {
      padding: 1rem !important;
    }

    .card {
      margin: 1rem !important;
    }
  }

  /* Pantallas medianas (tablets) */
  @media (min-width: 769px) and (max-width: 1024px) {
    .card-body {
      padding: 2.5rem !important;
    }

    .card {
      max-width: 400px !important;
    }
  }

  /* Pantallas grandes (desktop) */
  @media (min-width: 1025px) {
    .card-body {
      padding: 3rem 2.5rem !important;
    }

    .card {
      max-width: 420px !important;
    }

    .form-control-lg {
      font-size: 1rem !important;
      padding: 0.75rem 1rem !important;
    }
  }

  /* Pantallas extra grandes (large desktop) */
  @media (min-width: 1400px) {
    .card {
      max-width: 450px !important;
    }

    .card-body {
      padding: 3.5rem 3rem !important;
    }
  }

  /* Mejora para el contenedor principal */
  .container-fluid {
    max-width: 100vw;
    overflow-x: hidden;
  }

  /* Mejora para la tarjeta en pantallas muy grandes */
  .card {
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1) !important;
  }
</style>
