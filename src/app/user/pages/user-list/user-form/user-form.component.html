<div class="card shadow-lg w-100" style="max-width: 800px">
  <div class="card-header bg-primary text-white text-center">
    <h4 class="mb-0">Formulario de Registro</h4>
  </div>
  <div class="card-body p-4">
    <form id="registroForm" class="needs-validation" novalidate>
      <!-- Email & Password -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="email" class="form-label">Correo electrónico</label>
          <input
            type="email"
            id="email"
            class="form-control"
            name="email"
            required
            [ngModel]="newUser().email"
            (ngModelChange)="newUser().email = $event"
          />
        </div>

        <div class="col-md-6">
          <label for="password" class="form-label">Contraseña</label>
          <input
            type="password"
            id="password"
            class="form-control"
            name="password"
            required
            [ngModel]="newUser().password"
            (ngModelChange)="newUser().password = $event"
          />
        </div>
      </div>

      <!-- Nombre & Apellido -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="name" class="form-label">Nombre</label>
          <input
            type="text"
            id="name"
            class="form-control"
            name="name"
            required
            [ngModel]="newUser().name"
            (ngModelChange)="newUser().name = $event"
          />
        </div>

        <div class="col-md-6">
          <label for="lastName" class="form-label">Apellido</label>
          <input
            type="text"
            id="lastName"
            class="form-control"
            name="lastName"
            required
            [ngModel]="newUser().lastName"
            (ngModelChange)="newUser().lastName = $event"
          />
        </div>
      </div>

      <!-- Género & Fecha de Nacimiento -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="gender" class="form-label">Género</label>
          <input
            type="text"
            id="gender"
            class="form-control"
            name="gender"
            required
            [ngModel]="newUser().gender"
            (ngModelChange)="newUser().gender = $event"
          />
        </div>

        <div class="col-md-6">
          <label for="birthDate" class="form-label">Fecha de nacimiento</label>
          <input
            type="date"
            id="birthDate"
            class="form-control"
            name="birthDate"
            required
            [ngModel]="newUser().birthDate"
            (ngModelChange)="newUser().birthDate = $event"
          />
        </div>
      </div>

      <!-- Checkbox para cuenta bancaria -->
      <div class="form-check mb-3">
        <input
          class="form-check-input"
          type="checkbox"
          id="createAccount"
          [checked]="hasCreateAccount()"
          (change)="hasCreateAccount.set(!hasCreateAccount())"
        />
        <label class="form-check-label" for="createAccount">
          Crear cuenta bancaria
        </label>
      </div>

      <!-- Datos de cuenta bancaria -->
      @if (hasCreateAccount()) {
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="saldo" class="form-label">Saldo inicial</label>
          <input
            type="number"
            id="saldo"
            class="form-control"
            name="saldo"
            step="0.01"
            [ngModel]="newUser().saldo"
            (ngModelChange)="newUser().saldo = $event"
          />
        </div>

        <div class="col-md-6">
          <label for="type" class="form-label">Tipo de cuenta</label>
          <input
            type="text"
            id="type"
            class="form-control"
            name="type"
            required
            [ngModel]="newUser().type"
            (ngModelChange)="newUser().type = $event"
          />
        </div>
      </div>
      }

      <!-- Botón -->
      <div class="d-grid mt-4">
        <button
          type="button"
          class="btn btn-primary btn-lg"
          (click)="handleSubmit()"
        >
          Enviar
        </button>
      </div>
    </form>
  </div>
</div>
