<div
  class="card shadow-lg w-100"
  style="max-width: 800px"
  [ngClass]="{ 'edit-mode': isEditMode() }"
>
  <div
    class="card-header text-white text-center"
    [ngClass]="isEditMode() ? 'bg-success' : 'bg-primary'"
  >
    <h4 class="mb-0">
      {{ isEditMode() ? "Editar Usuario" : "Formulario de Registro" }}
    </h4>
    @if (isEditMode() && editingUser()) {
    <small class="d-block mt-1"> Editando: {{ editingUser().email }} </small>
    }
  </div>
  <div class="card-body p-4">
    <form id="registroForm" class="needs-validation" novalidate>
      <!-- Email & Password -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="email" class="form-label">Correo electrónico *</label>
          <input
            type="email"
            id="email"
            class="form-control"
            name="email"
            required
            [ngModel]="newUser().email"
            (ngModelChange)="newUser().email = $event"
          />
        </div>
        <div class="col-md-6">
          <label for="password" class="form-label">
            Contraseña {{ !isEditMode() ? "*" : "" }}
          </label>
          <input
            type="password"
            id="password"
            class="form-control"
            name="password"
            [required]="!isEditMode()"
            [disabled]="isEditMode()"
            [ngModel]="newUser().password"
            (ngModelChange)="newUser().password = $event"
            [placeholder]="
              isEditMode() ? 'La contraseña no se puede editar' : ''
            "
          />
        </div>
      </div>

      <!-- Nombre & Apellido -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="name" class="form-label">Nombre *</label>
          <input
            type="text"
            id="name"
            class="form-control"
            name="name"
            required
            [ngModel]="newUser().name"
            (ngModelChange)="newUser().name = $event"
          />
        </div>

        <div class="col-md-6">
          <label for="lastName" class="form-label">Apellido *</label>
          <input
            type="text"
            id="lastName"
            class="form-control"
            name="lastName"
            required
            [ngModel]="newUser().lastName"
            (ngModelChange)="newUser().lastName = $event"
          />
        </div>
      </div>

      <!-- CI & Móvil -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="ci" class="form-label">Cédula de Identidad *</label>
          <input
            type="text"
            id="ci"
            class="form-control"
            name="ci"
            required
            placeholder="ej: 12345678-9"
            [ngModel]="newUser().ci"
            (ngModelChange)="newUser().ci = $event"
          />
        </div>

        <div class="col-md-6">
          <label for="mobile" class="form-label">Móvil</label>
          <input
            type="text"
            id="mobile"
            class="form-control"
            name="mobile"
            placeholder="ej: +591 78888888"
            [ngModel]="newUser().mobile"
            (ngModelChange)="newUser().mobile = $event"
          />
        </div>
      </div>

      <!-- Dirección -->
      <div class="row mb-3">
        <div class="col-12">
          <label for="address" class="form-label">Dirección</label>
          <input
            type="text"
            id="address"
            class="form-control"
            name="address"
            placeholder="ej: Calle Principal 456, Cochabamba"
            [ngModel]="newUser().address"
            (ngModelChange)="newUser().address = $event"
          />
        </div>
      </div>
      <!-- Checkbox para cuenta bancaria (solo en modo creación) -->
      @if (!isEditMode()) {
      <div class="form-check mb-3">
        <input
          class="form-check-input"
          type="checkbox"
          id="createAccount"
          [checked]="hasCreateAccount()"
          (change)="hasCreateAccount.set(!hasCreateAccount())"
        />
        <label class="form-check-label" for="createAccount">
          Crear cuenta bancaria
        </label>
      </div>
      }
      <!-- Datos de cuenta bancaria (solo en modo creación) -->
      @if (hasCreateAccount() && !isEditMode()) {
      <div class="row mb-3">
        <div class="col-md-4">
          <label for="saldoInicial" class="form-label">Saldo inicial</label>
          <input
            type="number"
            id="saldoInicial"
            class="form-control"
            name="saldoInicial"
            step="0.01"
            min="0"
            placeholder="0.00"
            [ngModel]="newUser().saldoInicial"
            (ngModelChange)="newUser().saldoInicial = $event"
          />
        </div>

        <div class="col-md-4">
          <label for="tipoCuenta" class="form-label">Tipo de cuenta</label>
          <select
            id="tipoCuenta"
            class="form-control"
            name="tipoCuenta"
            [ngModel]="newUser().tipoCuenta"
            (ngModelChange)="newUser().tipoCuenta = $event"
          >
            <option value="SAVINGS">Ahorros</option>
            <option value="CHECKING">Corriente</option>
          </select>
        </div>

        <div class="col-md-4">
          <label for="moneda" class="form-label">Moneda</label>
          <select
            id="moneda"
            class="form-control"
            name="moneda"
            [ngModel]="newUser().moneda"
            (ngModelChange)="newUser().moneda = $event"
          >
            <option value="BOB">Bolivianos (BOB)</option>
            <option value="USD">Dólares (USD)</option>
          </select>
        </div>
      </div>
      }
      <!-- Botones -->
      <div class="d-grid mt-4">
        @if (isEditMode()) {
        <div class="d-flex gap-2">
          <button
            type="button"
            class="btn btn-success btn-lg flex-fill"
            (click)="handleSubmit()"
          >
            Actualizar Usuario
          </button>
          <button
            type="button"
            class="btn btn-secondary btn-lg"
            (click)="cancelEdit()"
          >
            Cancelar
          </button>
        </div>
        } @else {
        <button
          type="button"
          class="btn btn-primary btn-lg"
          (click)="handleSubmit()"
        >
          Registrar Usuario
        </button>
        }
      </div>
    </form>
  </div>
</div>
