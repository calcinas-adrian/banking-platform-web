<div class="d-flex flex-column flex-lg-row justify-content-center gap-3">
  <div>
    @if (error()) {
    <div class="alert alert-danger" role="alert">
      {{ error() }}
    </div>
    } @if (loading()) {
    <div class="d-flex justify-content-center my-4">
      <div class="spinner-border text-primary me-2" role="status"></div>
      <strong>Cargando usuarios...</strong>
    </div>
    }
    <section class="mb-5">
      <app-user-form
        [userIdToEdit]="editingUserId()"
        (userCreated)="onUserCreated($event)"
        (userUpdated)="onUserUpdated($event)"
      ></app-user-form>
    </section>
  </div>

  <div>
    <app-user-table
      [userList]="userList()"
      (isLoading)="loading.set($event)"
      (error)="error.set($event)"
      (newUserList)="userList.set($event)"
      (editUser)="onEditUser($event)"
    ></app-user-table>
  </div>
</div>
