<div class="container-lg">
  <div class="card shadow-lg border-0">
    <div class="card-header bg-primary text-white d-flex align-items-center">
      <i class="bi bi-people-fill fs-3 me-2"></i>
      <h3 class="mb-0">Lista de Usuarios</h3>
    </div>
    <div class="table-responsive">
      <table
        class="table table-bordered table-hover table-striped align-middle mb-0 rounded-3 overflow-hidden"
      >
        <thead class="table-light">
          <tr>
            <th scope="col">
              <i class="bi bi-person-fill me-1"></i>Nombre Completo
            </th>
            <th scope="col">
              <i class="bi bi-envelope-at-fill me-1"></i>Email
            </th>
            <th scope="col">Fecha de nacimiento</th>
            <th scope="col"><i class="bi bi-wallet2 me-1"></i>Cuenta(s)</th>
            <th scope="col">Opciones</th>
          </tr>
        </thead>
        <tbody>
          @for (user of userList(); track $index) {
          <tr>
            <td class="fw-semibold text-danger-emphasis">
              {{ user.fullName }}
            </td>
            <td class="text-break">{{ user.email }}</td>
            <td>
              <span class="badge bg-light text-dark border border-1">
                {{ user.addDate | date : "yyyy-MM-dd" }}
              </span>
            </td>
            <td>
              <span class="badge bg-info text-dark">
                {{
                  user.totalAccounts === 0 ? "Sin cuentas" : user.totalAccounts
                }}
              </span>
            </td>
            <td>
              <div class="btn-group" role="group">
                <button
                  class="btn btn-sm btn-outline-warning"
                  title="Editar"
                  (click)="user.id !== undefined && sendToEdit(user.id)"
                  [disabled]="user.id === undefined"
                >
                  <i class="bi bi-pencil-fill"></i>
                </button>
                <button
                  class="btn btn-sm btn-outline-danger"
                  title="Eliminar"
                  (click)="user.id !== undefined && deleteUser(user.id)"
                  [disabled]="user.id === undefined"
                >
                  <i class="bi bi-trash3-fill"></i>
                </button>
              </div>
            </td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
